<style>
  .v-main .contents .t-role-passport-container {
    --t-role-passport-base-color: #465298;

    --t-role-passport-base-color-command: #465298;

    width: 100%;
    
    display: flex;
    align-content: center;
    justify-content: center;
  }

  .v-main .contents .t-role-passport {
    display: flex;
    flex-direction: column;
    width: 50%;

    padding: 10px;
    background-color: var(--t-role-passport-base-color);

    border-radius: 1em;
  }

  .v-main .contents .t-role-passport-title {
    background: repeating-linear-gradient(
      45deg,
      var(--t-role-passport-base-color),
      var(--t-role-passport-base-color) 10px,
      color-mix(in hsl, var(--t-role-passport-base-color), white 13%) 10px,
      color-mix(in hsl, var(--t-role-passport-base-color), white 13%) 20px
    );
    display: flex;
    align-content: center;
    justify-content: center;
    padding: 0.5em;

    border-radius: 1em 1em 0 0;
  }

  .v-main .contents .t-role-passport-title > div {
    padding: 5px 10px;
    font-size: 1.3em;
    background-color: rgba(0, 0, 0, 0.2);
    border-radius: 7px;
  }

  .v-main .contents .t-role-passport-content {
    display: flex;
    flex-direction: row;
    width: 100%;
    
    background-color: #212121;

    border-radius: 0 0 1em 1em;

    align-items: center;
  }

  .v-main .contents .t-role-passport-img {
    flex-grow: 0;
    width: 192px;
    height: 192px;
    margin: 16px;
  }

  .v-main .contents .t-role-passport-img img {
    width: 100%;
    height: 100%;
  }

  .v-main .contents .t-role-passport-desc {
    flex-grow: 1;
  }

  .v-main .contents .t-role-passport-name {
    width: 100%;
    font-size: 1.5em;
    text-align: center;
  }

  .v-main .contents .t-role-passport-prop {
    display: flex;
    gap: 0.25em;
  }

  .v-main .contents .t-role-passport-prop-name::after {
    content: ":";
  }

  .v-main .contents .t-role-passport-line {
    height: 2px;
    width: 100%;
    background-color: rgba(255, 255, 255, 0.7);
    margin: 10px 0px;
  }
</style>

<div 
  class="t-role-passport-container" 
  style="--t-role-passport-base-color: var(--t-role-passport-base-color-{{department-color}});"
>
  <div class="t-role-passport">
    <div class="t-role-passport-title">
      <div><strong>{{department-name}}</strong></div>
    </div>
    <div class="t-role-passport-content">
      <div class="t-role-passport-img"><img src="{{char-img}}"/></div>
      <div class="t-role-passport-desc">
        <div class="t-role-passport-name">{{name}}</div>
        <div class="t-role-passport-line"></div>
        <div class="t-role-passport-props">

          <div class="t-role-passport-prop">
            <div class="t-role-passport-prop-name">
              <strong>Сложность</strong>
            </div>
            <div class="t-role-passport-prop-value">{{difficulty}}</div>
          </div>
          
          <div class="t-role-passport-prop">
            <div class="t-role-passport-prop-name">
              <strong>Обязанности</strong>
            </div>
            <div class="t-role-passport-prop-value">{{responsibilities}}</div>
          </div>

          <div class="t-role-passport-prop">
            <div class="t-role-passport-prop-name">
              <strong>Руководители</strong>
            </div>
            <div class="t-role-passport-prop-value">{{command}}</div>
          </div>

          <div class="t-role-passport-prop">
            <div class="t-role-passport-prop-name">
              <strong>Руководства</strong>
            </div>
            <div class="t-role-passport-prop-value">{{guides}}</div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
